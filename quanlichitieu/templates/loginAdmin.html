<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            padding: 12px 10px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .input-box i {
            position: absolute;
            right: 10px;
            top: 12px;
            opacity: 0.7;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff4b2b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff416c;
        }

        .extra {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .extra a {
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
        }

        .extra a:hover {
            opacity: 1;
        }

        .error {
            margin-top: 10px;
            text-align: center;
            color: #ffb3b3;
            font-size: 13px;
        }
        #login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff4b2b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🔐 Login</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="input-box">
            <input type="text" id="email" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
        </div>

        <input id="login" type="submit" value="Submit"/>

        <div class="extra">
            <p><a href="#">Quên mật khẩu?</a></p>
        </div>
    </form>
    {% if messages %}
      <ul class="messages">
          {% for message in messages %}
              <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
          {% endfor %}
      </ul>
    {% endif %}
{#    <div class="error" id="error"></div>#}
</div>
</body>
</html>
